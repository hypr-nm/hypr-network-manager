name: Build Containers

on:
  push:
    paths:
      - '.ci/docker/**'
      - '.github/workflows/build-containers.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        distro: [ubuntu, fedora, arch]

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build \
            -f .ci/docker/${{ matrix.distro }}.Dockerfile \
            -t ghcr.io/${{ github.repository }}-${{ matrix.distro }}:latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}-${{ matrix.distro }}:latest