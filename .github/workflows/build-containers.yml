name: Build Containers

on:
  push:
    paths:
      - '.ci/docker/**'
      - '.github/workflows/build-containers.yml'

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve distro matrix from changed files
        id: set-matrix
        run: |
          set -euo pipefail

          before_sha="${{ github.event.before }}"
          after_sha="${{ github.sha }}"

          if [[ "$before_sha" == "0000000000000000000000000000000000000000" ]]; then
            changed_files="$(git show --pretty='' --name-only "$after_sha")"
          else
            changed_files="$(git diff --name-only "$before_sha" "$after_sha")"
          fi

          printf 'changed_files:\n%s\n' "$changed_files"

          declare -a distros=()

          while IFS= read -r file; do
            case "$file" in
              .ci/docker/ubuntu.Dockerfile)
                distros+=(ubuntu)
                ;;
              .ci/docker/fedora.Dockerfile)
                distros+=(fedora)
                ;;
              .ci/docker/arch.Dockerfile)
                distros+=(arch)
                ;;
              .ci/docker/*)
                # Shared docker context changed; rebuild all images.
                distros=(ubuntu fedora arch)
                break
                ;;
            esac
          done <<< "$changed_files"

          if [[ ${#distros[@]} -eq 0 ]]; then
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
            echo 'matrix={"distro":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          matrix='{"distro":['
          sep=''
          for distro in "${distros[@]}"; do
            matrix="${matrix}${sep}\"${distro}\""
            sep=','
          done
          matrix="${matrix}]}"

          echo "resolved_matrix=${matrix}"

          echo 'has_changes=true' >> "$GITHUB_OUTPUT"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      # Normalize owner to lowercase (GHCR requirement)
      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          IMAGE_BASE="ghcr.io/${{ env.OWNER_LC }}/hypr-network-manager-${{ matrix.distro }}"
          docker build \
            -f .ci/docker/${{ matrix.distro }}.Dockerfile \
            -t "${IMAGE_BASE}:${{ github.sha }}" \
            -t "${IMAGE_BASE}:latest" .

      - name: Push image
        run: |
          IMAGE_BASE="ghcr.io/${{ env.OWNER_LC }}/hypr-network-manager-${{ matrix.distro }}"
          docker push "${IMAGE_BASE}:${{ github.sha }}"
          docker push "${IMAGE_BASE}:latest"
