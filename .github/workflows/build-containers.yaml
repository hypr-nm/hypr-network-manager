name: Build Containers

on:
  push:
    paths:
      - '.ci/docker/**'
      - '.github/workflows/build-containers.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        distro: [ubuntu, fedora, arch]

    steps:
      - uses: actions/checkout@v4

      # Normalize owner to lowercase (GHCR requirement)
      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -f .ci/docker/${{ matrix.distro }}.Dockerfile \
            -t ghcr.io/${{ env.OWNER_LC }}/hypr-network-manager-${{ matrix.distro }}:latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ env.OWNER_LC }}/hypr-network-manager-${{ matrix.distro }}:latest
