name: Compile test

on:
  push:
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    env:
      PREFIX: /usr/local
      PKG_CONFIG_PATH: /usr/local/lib/x86_64-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig
      LD_LIBRARY_PATH: /usr/local/lib/x86_64-linux-gnu:/usr/local/lib

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache gtk4-layer-shell (Ubuntu)
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/libgtk4-layer-shell*.so*
            /usr/local/lib/x86_64-linux-gnu/libgtk4-layer-shell*.so*
            /usr/local/lib/pkgconfig/gtk4-layer-shell-0.pc
            /usr/local/lib/x86_64-linux-gnu/pkgconfig/gtk4-layer-shell-0.pc
            /usr/local/share/vala/vapi/gtk4-layer-shell-0.vapi
            /usr/local/share/gir-1.0/Gtk4LayerShell-0.1.gir
            /usr/local/lib/girepository-1.0/Gtk4LayerShell-0.1.typelib
            /usr/local/lib/x86_64-linux-gnu/girepository-1.0/Gtk4LayerShell-0.1.typelib
          key: ${{ runner.os }}-gtk4-layer-shell-724be167

      # Cache meson build directory
      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: builddir-ci
          key: ${{ runner.os }}-meson-${{ hashFiles('**/meson.build') }}

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build valac pkg-config python3 \
            libwayland-dev wayland-protocols \
            libgtk-4-dev gobject-introspection libgirepository1.0-dev gtk-doc-tools \
            libjson-glib-dev network-manager \
            git shellcheck

      - name: Build gtk4-layer-shell
        run: |
          set -euo pipefail

          if ! pkg-config --exists gtk4-layer-shell-0 || [ ! -f /usr/local/share/vala/vapi/gtk4-layer-shell-0.vapi ]; then
            git clone https://github.com/wmww/gtk4-layer-shell
            cd gtk4-layer-shell
            git checkout 724be1675be4a92e49e0e1a31330f4c4b3d99526

            meson setup build --prefix=$PREFIX
            ninja -C build
            sudo ninja -C build install
          else
            echo "gtk4-layer-shell already cached, skipping build"
          fi

          pkg-config --modversion gtk4-layer-shell-0
          test -f /usr/local/share/vala/vapi/gtk4-layer-shell-0.vapi

      - name: Shell syntax check
        run: bash -n scripts/*.sh scripts/lib/*.sh

      - name: Shell lint
        run: shellcheck scripts/*.sh scripts/lib/*.sh

      - name: Configure (release)
        run: |
          set -euo pipefail
          meson setup builddir-ci --buildtype=release

      - name: Compile
        run: |
          set -euo pipefail
          meson compile -C builddir-ci

      - name: Run binary test
        run: |
          set -euo pipefail
          ./builddir-ci/vala/hypr-network-manager --help > /dev/null

  build-test-fedora-container:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    env:
      PREFIX: /usr/local
      PKG_CONFIG_PATH: /usr/local/lib64/pkgconfig:/usr/local/lib/pkgconfig
      LD_LIBRARY_PATH: /usr/local/lib64:/usr/local/lib

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache gtk4-layer-shell (Fedora)
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib64/libgtk4-layer-shell*.so*
            /usr/local/lib64/pkgconfig/gtk4-layer-shell-0.pc
            /usr/local/share/vala/vapi/gtk4-layer-shell-0.vapi
            /usr/local/share/gir-1.0/Gtk4LayerShell-0.1.gir
            /usr/local/lib64/girepository-1.0/Gtk4LayerShell-0.1.typelib
          key: fedora-gtk4-layer-shell-724be167

      - name: Install dependencies
        run: |
          set -euo pipefail
          dnf -y update
          dnf -y install \
            meson ninja-build vala pkgconf-pkg-config python3 \
            wayland-devel wayland-protocols-devel \
            gtk4-devel gobject-introspection-devel gobject-introspection gtk-doc \
            json-glib-devel NetworkManager \
            git ShellCheck

      - name: Build gtk4-layer-shell
        run: |
          set -euo pipefail

          if ! pkg-config --exists gtk4-layer-shell-0 || [ ! -f /usr/local/share/vala/vapi/gtk4-layer-shell-0.vapi ]; then
            git clone https://github.com/wmww/gtk4-layer-shell
            cd gtk4-layer-shell
            git checkout 724be1675be4a92e49e0e1a31330f4c4b3d99526

            meson setup build --prefix=$PREFIX
            ninja -C build
            ninja -C build install
          else
            echo "gtk4-layer-shell already cached, skipping build"
          fi

          pkg-config --modversion gtk4-layer-shell-0

      - name: Shell syntax check
        run: bash -n scripts/*.sh scripts/lib/*.sh

      - name: Shell lint
        run: shellcheck scripts/*.sh scripts/lib/*.sh

      - name: Configure (release)
        run: |
          set -euo pipefail
          meson setup builddir-ci-fedora --buildtype=release

      - name: Compile
        run: |
          set -euo pipefail
          meson compile -C builddir-ci-fedora

      - name: Run binary test
        run: |
          set -euo pipefail
          ./builddir-ci-fedora/vala/hypr-network-manager --help > /dev/null

