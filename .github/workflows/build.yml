name: Compile test

on:
  push:
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-ubuntu-container:
    runs-on: ubuntu-latest

    env:
      PREFIX: /usr/local
      PKG_CONFIG_PATH: /usr/local/lib/x86_64-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig
      LD_LIBRARY_PATH: /usr/local/lib/x86_64-linux-gnu:/usr/local/lib

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache gtk4-layer-shell build tree (Ubuntu)
        uses: actions/cache@v4
        with:
          path: .ci-cache/gtk4-layer-shell/ubuntu
          key: ${{ runner.os }}-gtk4-layer-shell-724be167

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build valac pkg-config python3 \
            libwayland-dev wayland-protocols \
            libgtk-4-dev gobject-introspection libgirepository1.0-dev gtk-doc-tools \
            libjson-glib-dev network-manager \
            git shellcheck

      - name: Build gtk4-layer-shell
        run: |
          set -euo pipefail

          CACHE_ROOT="$GITHUB_WORKSPACE/.ci-cache/gtk4-layer-shell/ubuntu"
          SRC_DIR="$CACHE_ROOT/src"
          BUILD_DIR="$SRC_DIR/build"
          mkdir -p "$CACHE_ROOT"

          if [ ! -d "$SRC_DIR/.git" ]; then
            git clone https://github.com/wmww/gtk4-layer-shell "$SRC_DIR"
          fi

          cd "$SRC_DIR"
          git fetch --depth 1 origin 724be1675be4a92e49e0e1a31330f4c4b3d99526
          git checkout 724be1675be4a92e49e0e1a31330f4c4b3d99526

          meson setup "$BUILD_DIR" --prefix=$PREFIX --reconfigure || meson setup "$BUILD_DIR" --prefix=$PREFIX
          ninja -C "$BUILD_DIR"
          sudo ninja -C "$BUILD_DIR" install

          pkg-config --modversion gtk4-layer-shell-0
          test -f /usr/local/include/gtk4-layer-shell/gtk4-layer-shell.h
          test -f /usr/local/share/vala/vapi/gtk4-layer-shell-0.vapi

      - name: Shell syntax check
        run: bash -n scripts/*.sh scripts/lib/*.sh

      - name: Shell lint
        run: shellcheck scripts/*.sh scripts/lib/*.sh

      - name: Configure (release)
        run: |
          set -euo pipefail
          meson setup builddir-ci --buildtype=release

      - name: Compile
        run: |
          set -euo pipefail
          meson compile -C builddir-ci

      - name: Run binary test
        run: |
          set -euo pipefail
          ./builddir-ci/vala/hypr-network-manager --help > /dev/null

  build-test-fedora-container:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    env:
      PREFIX: /usr/local
      PKG_CONFIG_PATH: /usr/local/lib64/pkgconfig:/usr/local/lib/pkgconfig
      LD_LIBRARY_PATH: /usr/local/lib64:/usr/local/lib

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache gtk4-layer-shell build tree (Fedora)
        uses: actions/cache@v4
        with:
          path: .ci-cache/gtk4-layer-shell/fedora
          key: fedora-gtk4-layer-shell-724be167

      - name: Install dependencies
        run: |
          set -euo pipefail
          dnf -y update
          dnf -y install \
            meson ninja-build vala pkgconf-pkg-config python3 \
            wayland-devel wayland-protocols-devel \
            gtk4-devel gobject-introspection-devel gobject-introspection gtk-doc \
            json-glib-devel NetworkManager \
            git ShellCheck

      - name: Build gtk4-layer-shell
        run: |
          set -euo pipefail

          CACHE_ROOT="$GITHUB_WORKSPACE/.ci-cache/gtk4-layer-shell/fedora"
          SRC_DIR="$CACHE_ROOT/src"
          BUILD_DIR="$SRC_DIR/build"
          mkdir -p "$CACHE_ROOT"

          if [ ! -d "$SRC_DIR/.git" ]; then
            git clone https://github.com/wmww/gtk4-layer-shell "$SRC_DIR"
          fi

          cd "$SRC_DIR"
          git fetch --depth 1 origin 724be1675be4a92e49e0e1a31330f4c4b3d99526
          git checkout 724be1675be4a92e49e0e1a31330f4c4b3d99526

          meson setup "$BUILD_DIR" --prefix=$PREFIX --reconfigure || meson setup "$BUILD_DIR" --prefix=$PREFIX
          ninja -C "$BUILD_DIR"
          ninja -C "$BUILD_DIR" install

          pkg-config --modversion gtk4-layer-shell-0
          test -f /usr/local/include/gtk4-layer-shell/gtk4-layer-shell.h
          test -f /usr/local/share/vala/vapi/gtk4-layer-shell-0.vapi

      - name: Shell syntax check
        run: bash -n scripts/*.sh scripts/lib/*.sh

      - name: Shell lint
        run: shellcheck scripts/*.sh scripts/lib/*.sh

      - name: Configure (release)
        run: |
          set -euo pipefail
          meson setup builddir-ci-fedora --buildtype=release

      - name: Compile
        run: |
          set -euo pipefail
          meson compile -C builddir-ci-fedora

      - name: Run binary test
        run: |
          set -euo pipefail
          ./builddir-ci-fedora/vala/hypr-network-manager --help > /dev/null

  build-test-arch-container:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    env:
      PREFIX: /usr/local
      PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
      LD_LIBRARY_PATH: /usr/local/lib

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache gtk4-layer-shell build tree (Arch)
        uses: actions/cache@v4
        with:
          path: .ci-cache/gtk4-layer-shell/arch
          key: arch-gtk4-layer-shell-724be167

      - name: Install dependencies
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm archlinux-keyring
          pacman -S --noconfirm --needed \
            base-devel git meson ninja vala pkgconf python \
            wayland wayland-protocols gtk4 gobject-introspection gtk-doc \
            json-glib networkmanager shellcheck

      - name: Build gtk4-layer-shell
        run: |
          set -euo pipefail

          CACHE_ROOT="$GITHUB_WORKSPACE/.ci-cache/gtk4-layer-shell/arch"
          SRC_DIR="$CACHE_ROOT/src"
          BUILD_DIR="$SRC_DIR/build"
          mkdir -p "$CACHE_ROOT"

          if [ ! -d "$SRC_DIR/.git" ]; then
            git clone https://github.com/wmww/gtk4-layer-shell "$SRC_DIR"
          fi

          cd "$SRC_DIR"
          git fetch --depth 1 origin 724be1675be4a92e49e0e1a31330f4c4b3d99526
          git checkout 724be1675be4a92e49e0e1a31330f4c4b3d99526

          meson setup "$BUILD_DIR" --prefix=$PREFIX --reconfigure || meson setup "$BUILD_DIR" --prefix=$PREFIX
          ninja -C "$BUILD_DIR"
          ninja -C "$BUILD_DIR" install

          pkg-config --modversion gtk4-layer-shell-0
          test -f /usr/local/include/gtk4-layer-shell/gtk4-layer-shell.h
          test -f /usr/local/share/vala/vapi/gtk4-layer-shell-0.vapi

      - name: Shell syntax check
        run: bash -n scripts/*.sh scripts/lib/*.sh

      - name: Shell lint
        run: shellcheck scripts/*.sh scripts/lib/*.sh

      - name: Configure (release)
        run: |
          set -euo pipefail
          meson setup builddir-ci-arch --buildtype=release

      - name: Compile
        run: |
          set -euo pipefail
          meson compile -C builddir-ci-arch

      - name: Run binary test
        run: |
          set -euo pipefail
          ./builddir-ci-arch/vala/hypr-network-manager --help > /dev/null

