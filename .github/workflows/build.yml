name: Compile test

on:
  push:
    paths:
      - 'vala/**'
      - 'meson.build'
      - '.github/workflows/build.yml'
  pull_request:

permissions:
  contents: read
  packages: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            build:
              - 'vala/**'
              - 'meson.build'
              - '.github/workflows/build.yml'

  build:
    needs: changes
    runs-on: ubuntu-latest

    strategy:
      matrix:
        distro: [ubuntu, fedora, arch]

    steps:
      - name: Skip if no relevant changes
        if: needs.changes.outputs.build != 'true'
        run: echo "No relevant changes, skipping build."

      - name: Checkout
        if: needs.changes.outputs.build == 'true'
        uses: actions/checkout@v4

      - name: Set lowercase owner
        if: needs.changes.outputs.build == 'true'
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        if: needs.changes.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag candidate
        if: needs.changes.outputs.build == 'true'
        id: image-tag
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "candidate=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "candidate=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull container image
        if: needs.changes.outputs.build == 'true'
        id: pull-image
        run: |
          set -euo pipefail
          IMAGE_BASE="ghcr.io/${{ env.OWNER_LC }}/hypr-network-manager-${{ matrix.distro }}"
          CANDIDATE_TAG="${{ steps.image-tag.outputs.candidate }}"

          if docker pull "${IMAGE_BASE}:${CANDIDATE_TAG}"; then
            IMAGE_TAG="$CANDIDATE_TAG"
          else
            echo "SHA tag not found, falling back to latest: ${IMAGE_BASE}:latest"
            docker pull "${IMAGE_BASE}:latest"
            IMAGE_TAG="latest"
          fi

          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Run build and test
        if: needs.changes.outputs.build == 'true'
        run: |
          docker run --rm \
            -v $PWD:/workspace \
            -w /workspace \
            ghcr.io/${{ env.OWNER_LC }}/hypr-network-manager-${{ matrix.distro }}:${{ steps.pull-image.outputs.tag }} \
            bash -lc "
              set -euo pipefail
              meson setup builddir --buildtype=release
              meson compile -C builddir
              ./builddir/vala/hypr-network-manager --help > /dev/null
            "
